name: netitexsignup
description: Netitex tenant owner signup web app
publish_to: "none"

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.0

  # Supabase backend
  supabase_flutter: ^2.12.4

  # Routing
  go_router: ^14.1.0

  # Secure local storage (for onboarding guard)
  flutter_secure_storage: ^9.2.2

  # Animations
  lottie: ^3.1.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/netitex_logo.png
    - assets/animations/netitex_intro.json

